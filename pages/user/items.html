<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/tokens.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/website.css">
    <title>Lost & Found - Browse Items</title>
</head>

<body class="website-layout web-bg-animated">
    <!-- Premium Navbar -->
    <nav id="navbar"></nav>

    <main class="web-main">
        <div class="web-container">

            <div
                style="margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px;">
                <div>
                    <h1 style="font-size: 2.5rem; margin-bottom: 8px;">Browse <span class="text-gradient">Feed</span>
                    </h1>
                    <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px;">
                        Search through all reported lost and found items.
                    </p>
                </div>
                <button class="web-btn web-btn-primary" onclick="window.location.href='/pages/user/report.html'">
                    + Report Item
                </button>
            </div>

            <!-- Modern Filters -->
            <div class="web-card"
                style="padding: 24px; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; justify-content: space-between;">
                <div style="display: flex; gap: 16px; flex: 1; min-width: 300px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <input class="web-input" id="fSearch" placeholder="Search keywords..." />
                    </div>
                    <div style="width: 140px;">
                        <select class="web-select" id="fType">
                            <option value="">All Types</option>
                            <option value="lost">Lost</option>
                            <option value="found">Found</option>
                        </select>
                    </div>
                    <div style="width: 140px;">
                        <select class="web-select" id="fStatus">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="matched">Matched</option>
                            <option value="claimed">Claimed</option>
                            <option value="archived">Archived</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 12px;">
                    <button class="web-btn web-btn-glass" id="btnRefresh" title="Refresh Feed">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 2v6h-6"></path>
                            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                            <path d="M3 22v-6h6"></path>
                            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                        </svg>
                    </button>
                    <button class="web-btn web-btn-primary" id="btnApply"
                        style="padding-left: 32px; padding-right: 32px;">Search</button>
                </div>
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 8px;">
                <div style="color: var(--text-muted);">
                    Showing <span id="statsCount" style="color: var(--text-main); font-weight: 600;">—</span> results
                </div>
            </div>

            <!-- Item Grid -->
            <div id="list" class="grid cols-3" style="gap: 24px;"></div>

            <!-- Pagination -->
            <div
                style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--card-border); padding-top: 24px;">
                <div style="color: var(--text-muted); font-size: 0.95rem;" id="pageInfo">—</div>
                <div style="display: flex; gap: 12px;">
                    <button class="web-btn web-btn-glass" id="btnPrev">Previous</button>
                    <button class="web-btn web-btn-glass" id="btnNext">Next</button>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { mountNavbar } from "/components/navbar.js";
        import { requireAuth, requireRole } from "/core/auth.js";
        import { api } from "/core/api.js";
        import { toast } from "/components/toast.js";

        requireAuth();
        requireRole("user", "staff", "admin");
        mountNavbar();

        const qs = new URLSearchParams(window.location.search);

        const fType = document.getElementById("fType");
        const fStatus = document.getElementById("fStatus");
        const fSearch = document.getElementById("fSearch");

        // prefill from URL
        fType.value = qs.get("type") ?? "";
        fStatus.value = qs.get("status") ?? "";
        fSearch.value = qs.get("q") ?? "";

        let pageUrl = "/items";

        function buildQuery() {
            const params = new URLSearchParams();
            if (fType.value) params.set("type", fType.value);
            if (fStatus.value) params.set("status", fStatus.value);
            if (fSearch.value.trim()) params.set("q", fSearch.value.trim()); // frontend-only, see note below
            return params.toString();
        }

        // NOTE:
        // Your backend ItemsController currently filters type/status/category.
        // If you want full search, we can add a backend "q" filter later.
        // For now, we’ll fetch then filter client-side for "q".

        function itemCard(item) {
            const statusClass = item.status || "default";

            const badgeBg = item.status === "pending" ? "rgba(255, 159, 10, 0.15)" :
                item.status === "matched" ? "rgba(94, 92, 230, 0.15)" :
                    item.status === "claimed" ? "rgba(48, 209, 88, 0.15)" : "rgba(255,255,255,0.08)";

            const badgeColor = item.status === "pending" ? "#FF9F0A" :
                item.status === "matched" ? "#5E5CE6" :
                    item.status === "claimed" ? "#30D158" : "#A1A1A6";

            const typeBg = item.type === "lost" ? "rgba(255, 69, 58, 0.15)" : "rgba(10, 132, 255, 0.15)";
            const typeColor = item.type === "lost" ? "#FF453A" : "#0A84FF";

            const img = item.image_path ? `/storage/${item.image_path}` : "";

            return `
        <div class="web-card web-card-hoverable animate-in stagger-2" style="padding:0; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; gap:0;">
          
            <div style="width: 100%; height: 220px; background: rgba(0,0,0,0.5); position: relative; border-bottom: 1px solid var(--card-border); overflow: hidden;">
            ${img
                    ? `<img src="${img}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/1d1d1f/white?text=No+Image&font=Inter';" alt="${item.title}" style="width:100%; height:100%; object-fit:cover; opacity: 0.9; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" />`
                    : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;">No Image</div>`
                }
            <div style="position: absolute; top: 16px; left: 16px; display:flex; gap:8px; flex-wrap:wrap;">
              <span style="padding:4px 12px; border-radius:12px; background: ${typeBg}; color:${typeColor}; font-size:0.7rem; font-weight:600; letter-spacing:0.5px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05);">
                ${item.type.toUpperCase()}
              </span>
              <span style="padding:4px 12px; border-radius:12px; background: ${badgeBg}; color:${badgeColor}; font-size:0.7rem; font-weight:600; letter-spacing:0.5px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05);">
                ${item.status.toUpperCase()}
              </span>
            </div>
          </div>

          <div style="padding: 24px; display: flex; flex-direction: column; flex: 1; background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 100%);">
              <h3 style="font-size: 1.25rem; font-weight: 600; margin: 0 0 12px 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing: -0.01em;" title="${item.title}">
                ${item.title}
              </h3>
              
              <div style="display: flex; gap: 8px; color:var(--text-muted); font-size:0.8rem; font-weight: 500; letter-spacing: 0.5px; margin-bottom: 16px; align-items: center; text-transform: uppercase;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.location ?? "Unknown"}</span>
                <span style="margin: 0 4px; opacity: 0.5;">•</span>
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.category ?? "Misc"}</span>
              </div>

              <div style="color:var(--text-muted); font-size:0.9rem; line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom: 24px;">
                ${item.description ?? "No description provided."}
              </div>

              <button class="web-btn web-btn-glass" style="width: 100%; justify-content: center; margin-top: auto; padding: 12px 0; background: rgba(255,255,255,0.03);" data-open="${item.id}">
                View Details
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px;"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
              </button>
          </div>
        </div>
      `;
        }

        async function load(url = "/items") {
            const query = buildQuery();

            // server-side filters
            const serverParams = new URLSearchParams();
            if (fType.value) serverParams.set("type", fType.value);
            if (fStatus.value) serverParams.set("status", fStatus.value);

            const apiUrl = `${url}${serverParams.toString() ? `?${serverParams}` : ""}`;

            const res = await api.get(apiUrl);
            let data = res.data ?? res; // Laravel paginator json usually has data

            // If response is paginator:
            const items = res.data ? res.data : res.data;
            const list = res.data ? res.data : res.data; // (kept simple)

            const pageItems = res.data ? res.data : res.data;

            // Normalize paginator shape from Laravel:
            const rows = res.data ?? res.data; // placeholder
            const actualRows = res.data ? res.data : res.data;

            // Better: detect by presence of "data" array
            const rows2 = Array.isArray(res.data) ? res.data : (res.data ?? res.data);
        }

        function normalizePaginator(payload) {
            // Laravel paginator usually returns { data:[], current_page, last_page, from, to, total, next_page_url, prev_page_url }
            if (payload && Array.isArray(payload.data)) return payload;
            // If you return plain array, wrap it
            return {
                data: Array.isArray(payload) ? payload : [],
                current_page: 1,
                last_page: 1,
                from: payload?.length ? 1 : null,
                to: payload?.length ?? null,
                total: payload?.length ?? 0,
                next_page_url: null,
                prev_page_url: null,
            };
        }

        async function loadPage(url = "/items", delay = false) {
            const serverParams = new URLSearchParams();
            if (fType.value) serverParams.set("type", fType.value);
            if (fStatus.value) serverParams.set("status", fStatus.value);

            const listEl = document.getElementById("list");
            if (delay) {
                // Skeleton loading
                listEl.innerHTML = Array(6).fill(`
                <div class="web-card" style="padding:0; overflow:hidden; display:flex; flex-direction:column; gap:0; animation: pulse 1.5s infinite;">
                  <div style="width: 100%; height: 220px; background: rgba(255,255,255,0.05);"></div>
                  <div style="padding: 24px; display: flex; flex-direction: column; flex: 1;">
                      <div style="height: 24px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 12px; width: 80%;"></div>
                      <div style="height: 16px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 24px; width: 60%;"></div>
                      <div style="height: 48px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-top: auto;"></div>
                  </div>
                </div>
                `).join("");

                // Add pulse animation if not exists
                if (!document.getElementById("pulseAnim")) {
                    const style = document.createElement("style");
                    style.id = "pulseAnim";
                    style.innerHTML = `
                        @keyframes pulse {
                            0% { opacity: 1; }
                            50% { opacity: 0.5; }
                            100% { opacity: 1; }
                        }
                    `;
                    document.head.appendChild(style);
                }

                await new Promise(r => setTimeout(r, 3000));
            }

            const full = `${url}${url.includes("?") ? "&" : "?"}${serverParams.toString()}`;
            const payload = await api.get(full);

            const p = normalizePaginator(payload);
            let rows = p.data;

            // client-side search for now
            const q = fSearch.value.trim().toLowerCase();
            if (q) {
                rows = rows.filter(r => {
                    const hay = `${r.title ?? ""} ${r.description ?? ""} ${r.location ?? ""} ${r.category ?? ""} ${r.brand ?? ""} ${r.color ?? ""}`.toLowerCase();
                    return hay.includes(q);
                });
            }

            document.getElementById("statsCount").textContent = p.total ?? rows.length;

            if (!rows.length) {
                listEl.innerHTML = `<div class="web-card" style="padding:32px; grid-column:1/-1; text-align:center;">
          <div style="font-weight:700; font-size: 1.25rem; margin-bottom: 8px;">No results found</div>
          <div style="color:var(--text-muted);">Try changing your search keywords or filters to find what you're looking for.</div>
        </div>`;
            } else {
                listEl.innerHTML = rows.map(itemCard).join("");
            }

            document.getElementById("pageInfo").textContent =
                `Page ${p.current_page} of ${p.last_page} • Showing ${p.from ?? 0}-${p.to ?? rows.length} of ${p.total ?? rows.length}`;

            // Save next/prev URLs for buttons (Laravel returns full URLs; we must convert to path)
            const next = p.next_page_url ? new URL(p.next_page_url).pathname + new URL(p.next_page_url).search : null;
            const prev = p.prev_page_url ? new URL(p.prev_page_url).pathname + new URL(p.prev_page_url).search : null;

            // Convert /api/items?... to /items?... because api.get already prepends baseUrl
            const stripApiPrefix = (u) => u ? u.replace(/^\/api/, "") : null;

            window.__next = stripApiPrefix(next);
            window.__prev = stripApiPrefix(prev);

            // Open handler
            listEl.querySelectorAll("[data-open]").forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-open");
                    window.location.href = `/ pages / user / item - show.html ? id = ${encodeURIComponent(id)} `;
                });
            });
        }

        document.getElementById("btnApply").addEventListener("click", async (e) => {
            const btn = e.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg style="margin-right: 8px; animation: spin 1s linear infinite;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Searching...`;
            if (!document.getElementById("spinAnim")) {
                const style = document.createElement("style");
                style.id = "spinAnim";
                style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
                document.head.appendChild(style);
            }
            btn.disabled = true;

            const params = new URLSearchParams();
            if (fType.value) params.set("type", fType.value);
            if (fStatus.value) params.set("status", fStatus.value);
            if (fSearch.value.trim()) params.set("q", fSearch.value.trim());
            // Update URL without reloading so sharing links works
            window.history.replaceState({}, "", `${window.location.pathname}?${params.toString()}`);

            await loadPage("/items", true);

            btn.innerHTML = originalText;
            btn.disabled = false;
        });

        document.getElementById("btnRefresh").addEventListener("click", () => loadPage("/items", true));

        document.getElementById("btnPrev").addEventListener("click", () => {
            if (!window.__prev) return toast("No previous page.", "warn");
            loadPage(window.__prev);
        });

        document.getElementById("btnNext").addEventListener("click", () => {
            if (!window.__next) return toast("No next page.", "warn");
            loadPage(window.__next);
        });

        // initial load
        loadPage("/items");
    </script>
</body>

</html>
